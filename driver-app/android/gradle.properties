# Project-wide Gradle settings.

# 避免 Windows 上 Gradle 8.6+ 的 "Could not move temporary workspace" 问题
org.gradle.configuration-cache=false
org.gradle.caching=false

# 禁止 Gradle 自动下载 JDK 17，改用本机已安装的 JDK（如 21），避免 GitHub 连接超时
org.gradle.java.installations.auto-download=false
# 指定本机 JDK 路径（Android Studio 自带 JBR），Gradle 会用其满足 Java 17 工具链要求
org.gradle.java.installations.paths=C\:\\Program Files\\Android\\Android Studio\\jbr

org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

android.useAndroidX=true
android.enableJetifier=true

reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
newArchEnabled=false
hermesEnabled=true

# API 服务 Nginx 反向代理（api.mody.中国）
# 复制到 ECS：/etc/nginx/conf.d/nginx-api.conf
# 使用前：1) 将 server_name 改为你的域名（如 api.mody.中国） 2) HTTPS 需配置证书
#
# 部署脚本 deploy.sh 只启动 Node（PM2），公网访问必须由 Nginx 监听 80/443 并反代到 Node。

# HTTP（若仅用 IP 或先测通再上 HTTPS，可先用这个）
server {
    listen       80;
    server_name  api.mody.中国 api.mody.xn--fiqs8s;
    # 若用 IP 测试，可临时改为: server_name _;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}


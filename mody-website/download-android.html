<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="摩迪 Mody - Android 版下载">
    <title>下载摩迪 Android 版 - 摩迪 Mody</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #fafbfc;
            --color-surface: #ffffff;
            --color-primary: #0d9488;
            --color-primary-light: #2dd4bf;
            --color-primary-dark: #0f766e;
            --color-text: #1e293b;
            --color-text-muted: #64748b;
            --color-border: #e2e8f0;
            --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --transition: 0.25s ease;
            --pad-x: clamp(16px, 4vw, 32px);
            --pad-y: clamp(24px, 5vw, 48px);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font-sans);
            background: linear-gradient(180deg, #f0fdfa 0%, #fafbfc 50%);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--pad-y) var(--pad-x);
        }

        /* ========== 下载区域（系统浏览器） ========== */
        .download-area {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: min(400px, 92vw);
        }
        .download-area.visible { display: flex; }

        .download-logo {
            width: clamp(56px, 14vw, 72px);
            height: clamp(56px, 14vw, 72px);
            margin-bottom: clamp(12px, 2vw, 20px);
            border-radius: 16px;
            box-shadow: var(--shadow);
            object-fit: contain;
        }
        .download-app-name {
            font-size: clamp(1rem, 2.5vw, 1.125rem);
            color: var(--color-text-muted);
            margin-bottom: clamp(4px, 1vw, 8px);
            font-weight: 500;
        }
        .download-title {
            font-size: clamp(1.5rem, 4vw, 1.75rem);
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: clamp(20px, 4vw, 32px);
            letter-spacing: -0.02em;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 280px;
            padding: clamp(14px, 3vw, 18px) clamp(24px, 5vw, 32px);
            background: var(--color-primary);
            color: white;
            font-family: inherit;
            font-size: clamp(1rem, 2.5vw, 1.125rem);
            font-weight: 600;
            text-decoration: none;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .download-btn:hover { background: var(--color-primary-dark); transform: translateY(-2px); box-shadow: 0 6px 28px rgba(13, 148, 136, 0.35); }
        .download-btn:active { transform: translateY(0); }
        .download-hint {
            margin-top: clamp(16px, 3vw, 24px);
            font-size: clamp(0.75rem, 1.8vw, 0.875rem);
            color: var(--color-text-muted);
        }

        /* ========== 蒙版（微信/QQ/支付宝等内置浏览器） ========== */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.52);
            align-items: center;
            justify-content: center;
            padding: var(--pad-x);
        }
        .overlay.visible { display: flex; }

        .overlay-card {
            background: var(--color-surface);
            border-radius: var(--radius);
            padding: clamp(28px, 6vw, 40px);
            max-width: min(340px, 92vw);
            width: 100%;
            box-shadow: 0 24px 48px rgba(0,0,0,0.18);
            text-align: center;
        }
        .overlay-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto clamp(20px, 4vw, 28px);
            position: relative;
        }
        .overlay-icon svg {
            width: 100%;
            height: 100%;
            color: var(--color-primary);
        }
        .overlay-title {
            font-size: clamp(1.125rem, 3vw, 1.25rem);
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: clamp(10px, 2vw, 14px);
            line-height: 1.35;
        }
        .overlay-desc {
            font-size: clamp(0.875rem, 2vw, 0.9375rem);
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: clamp(8px, 1.5vw, 12px);
        }
        .overlay-desc-secondary {
            font-size: clamp(0.8125rem, 1.8vw, 0.875rem);
            color: var(--color-text-muted);
            opacity: 0.9;
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <!-- 系统浏览器：下载区域 -->
    <div class="download-area" id="downloadArea">
        <img class="download-logo" src="/assets/ic_launcher.png" alt="摩迪" onerror="this.style.display='none'">
        <p class="download-app-name">摩迪 Mody</p>
        <h1 class="download-title">摩迪 Android 版</h1>
        <a class="download-btn" id="downloadBtn" href="" download>立即下载</a>
        <p class="download-hint">如未自动下载，请点击上方按钮</p>
    </div>

    <!-- 内置浏览器：蒙版 -->
    <div class="overlay" id="overlay">
        <div class="overlay-card">
            <div class="overlay-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M32 16v32M32 16l12 12M32 16L20 28" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="48" cy="16" r="6" stroke="currentColor" stroke-width="2.5" fill="none"/>
                </svg>
            </div>
            <h2 class="overlay-title">请用浏览器打开</h2>
            <p class="overlay-desc">点击右上角 <strong>⋯</strong> 或 <strong>···</strong>，选择「在浏览器中打开」</p>
            <p class="overlay-desc-secondary">打开后即可下载安装</p>
        </div>
    </div>

    <script>
        (function() {
            var APK_URL = 'http://mody.xn--fiqs8s/downloads/mody-android.apk';
            var IN_APP_UA_PATTERNS = ['MicroMessenger', 'QQ/', 'AlipayClient', 'UCBrowser'];
            var ua = typeof navigator !== 'undefined' ? navigator.userAgent : '';
            var isInApp = IN_APP_UA_PATTERNS.some(function(p) { return ua.indexOf(p) !== -1; });

            var overlay = document.getElementById('overlay');
            var downloadArea = document.getElementById('downloadArea');
            var downloadBtn = document.getElementById('downloadBtn');

            if (downloadBtn) {
                downloadBtn.href = APK_URL;
                downloadBtn.setAttribute('download', 'mody-android.apk');
            }

            if (isInApp) {
                if (overlay) overlay.classList.add('visible');
                if (downloadArea) downloadArea.classList.remove('visible');
            } else {
                if (overlay) overlay.classList.remove('visible');
                if (downloadArea) downloadArea.classList.add('visible');
                setTimeout(function() {
                    if (window.location.href.indexOf('download-android') !== -1) {
                        window.location.href = APK_URL;
                    }
                }, 1000);
            }
        })();
    </script>
</body>
</html>

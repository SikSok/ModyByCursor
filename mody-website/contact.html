<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="联系 - 摩迪 Mody｜商务合作、问题反馈与用户服务">
    <title>联系 ｜ 摩迪 Mody</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #fafbfc;
            --color-surface: #ffffff;
            --color-primary: #0d9488;
            --color-primary-dark: #0f766e;
            --color-text: #1e293b;
            --color-text-muted: #64748b;
            --color-border: #e2e8f0;
            --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --transition: 0.25s ease;
            --container-max: 1200px;
            --pad-x: clamp(16px, 4vw, 32px);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
            font-size: clamp(0.9375rem, 1.8vw, 1rem);
        }
        img { max-width: 100%; height: auto; display: block; }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--color-border);
        }
        .nav-inner {
            max-width: var(--container-max);
            margin: 0 auto;
            padding: clamp(12px, 2vw, 16px) var(--pad-x);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 10px);
            text-decoration: none;
            color: var(--color-text);
            font-weight: 700;
            font-size: clamp(1rem, 2.2vw, 1.25rem);
        }
        .nav-logo img { height: clamp(28px, 5vw, 36px); width: auto; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: clamp(16px, 3vw, 32px);
        }
        .nav-links a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: clamp(0.875rem, 1.8vw, 1rem);
            transition: color var(--transition);
        }
        .nav-links a:hover { color: var(--color-primary); }

        .page {
            padding: clamp(100px, 16vw, 140px) var(--pad-x) clamp(48px, 10vw, 80px);
            max-width: min(640px, 92vw);
            margin: 0 auto;
        }
        .page h1 {
            font-size: clamp(1.5rem, 3.5vw, 2rem);
            font-weight: 700;
            margin-bottom: clamp(16px, 3vw, 24px);
            color: var(--color-text);
        }
        .page-intro {
            font-size: clamp(0.9375rem, 1.8vw, 1.0625rem);
            color: var(--color-text);
            margin-bottom: clamp(20px, 3vw, 28px);
        }
        .page-intro p { margin-bottom: 1em; }
        .page-intro p:last-child { margin-bottom: 0; }

        .contact-card {
            margin-top: clamp(28px, 4vw, 40px);
            padding: clamp(24px, 4vw, 32px);
            background: var(--color-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
            text-align: center;
        }
        .contact-card h2 {
            font-size: clamp(1rem, 2vw, 1.125rem);
            font-weight: 600;
            margin-bottom: clamp(12px, 2vw, 16px);
            color: var(--color-text);
        }
        .contact-qr {
            width: clamp(200px, 40vw, 260px);
            height: clamp(200px, 40vw, 260px);
            margin: 0 auto clamp(12px, 2vw, 16px);
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }
        .contact-qr img { width: 100%; height: 100%; object-fit: contain; }
        .contact-id {
            font-size: clamp(0.8125rem, 1.6vw, 0.9375rem);
            color: var(--color-text-muted);
        }
        .contact-id .copy-btn {
            color: var(--color-primary);
            cursor: pointer;
            text-decoration: none;
            border: none;
            background: none;
            font: inherit;
            padding: 0;
        }
        .contact-id .copy-btn:hover { text-decoration: underline; }

        .feedback-section {
            margin-top: clamp(28px, 4vw, 40px);
            padding: clamp(24px, 4vw, 32px);
            background: var(--color-surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
        }
        .feedback-title {
            font-size: clamp(1rem, 2vw, 1.125rem);
            font-weight: 600;
            margin-bottom: clamp(8px, 1.5vw, 12px);
            color: var(--color-text);
        }
        .feedback-desc {
            font-size: clamp(0.875rem, 1.8vw, 0.9375rem);
            color: var(--color-text-muted);
            line-height: 1.6;
            margin-bottom: clamp(20px, 3vw, 24px);
        }
        .feedback-form .form-group { margin-bottom: clamp(16px, 2vw, 20px); }
        .feedback-form .form-row { display: flex; flex-wrap: wrap; gap: clamp(16px, 2vw, 20px); }
        .feedback-form .form-row .form-group { flex: 1; min-width: min(200px, 100%); }
        .form-label {
            display: block;
            font-size: clamp(0.875rem, 1.8vw, 0.9375rem);
            font-weight: 500;
            color: var(--color-text);
            margin-bottom: 6px;
        }
        .form-label .required { color: #dc2626; }
        .form-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px 14px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: clamp(0.9375rem, 1.8vw, 1rem);
            color: var(--color-text);
            resize: vertical;
            box-sizing: border-box;
        }
        .form-textarea:focus { outline: none; border-color: var(--color-primary); }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: clamp(0.9375rem, 1.8vw, 1rem);
            color: var(--color-text);
            box-sizing: border-box;
        }
        .form-input:focus { outline: none; border-color: var(--color-primary); }
        .feedback-message {
            font-size: clamp(0.875rem, 1.8vw, 0.9375rem);
            margin-bottom: 12px;
            min-height: 1.4em;
        }
        .feedback-message.success { color: var(--color-primary-dark); font-weight: 500; }
        .feedback-message.error { color: #dc2626; }
        .feedback-submit {
            display: inline-block;
            padding: clamp(10px, 1.5vw, 14px) clamp(24px, 3vw, 32px);
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: clamp(0.9375rem, 1.8vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .feedback-submit:hover { background: var(--color-primary-dark); }
        .feedback-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        .footer {
            padding: clamp(24px, 4vw, 48px) var(--pad-x) clamp(16px, 2vw, 24px);
            background: var(--color-text);
            color: rgba(255,255,255,0.8);
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            margin-top: clamp(40px, 8vw, 80px);
        }
        .footer-inner { max-width: var(--container-max); margin: 0 auto; text-align: center; }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(12px, 2vw, 24px);
            margin-bottom: clamp(12px, 2vw, 24px);
        }
        .footer-links a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }
        .footer-links a:hover { text-decoration: underline; }
        .footer-beian {
            margin-bottom: clamp(8px, 1.5vw, 12px);
            color: rgba(255,255,255,0.7);
        }
        .footer-beian a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
        }
        .footer-beian a:hover { text-decoration: underline; }
        .footer-beian a + a { margin-left: 1em; }
        .footer-copy { color: rgba(255,255,255,0.6); }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav.open .nav-links {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--color-surface);
                padding: var(--pad-x);
                gap: 12px;
                border-bottom: 1px solid var(--color-border);
            }
            .nav-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 44px;
                height: 44px;
                background: none;
                border: none;
                cursor: pointer;
                padding: 0;
            }
            .nav-toggle span, .nav-toggle span::before, .nav-toggle span::after {
                display: block;
                width: 22px;
                height: 2px;
                background: var(--color-text);
                border-radius: 1px;
                transition: var(--transition);
            }
            .nav-toggle span { position: relative; }
            .nav-toggle span::before, .nav-toggle span::after {
                content: '';
                position: absolute;
                left: 0;
                top: -7px;
            }
            .nav-toggle span::after { top: 7px; }
            .nav.open .nav-toggle span { background: transparent; }
            .nav.open .nav-toggle span::before { top: 0; transform: rotate(45deg); }
            .nav.open .nav-toggle span::after { top: 0; transform: rotate(-45deg); }
        }
        .nav-toggle { display: none; }
    </style>
</head>
<body>
    <header class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="assets/logo.svg" alt="摩迪">
                <span>摩迪 Mody</span>
            </a>
            <nav class="nav-links">
                <a href="index.html#product">产品介绍</a>
                <a href="index.html#download">软件下载</a>
                <a href="promo.html">推广合作</a>
                <a href="contact.html">联系</a>
            </nav>
            <button type="button" class="nav-toggle" id="navToggle" aria-label="打开菜单"><span></span></button>
        </div>
    </header>

    <main class="page">
        <h1>联系</h1>
        <div class="page-intro">
            <p>欢迎扫码添加微信，商务合作、问题反馈与用户服务均可联系。</p>
        </div>

        <section class="feedback-section">
            <h2 class="feedback-title">留言与反馈</h2>
            <p class="feedback-desc">如有建议、合作意向或问题，可在此留言；选填联系方式便于我们回复您。您的留言仅用于改进产品与合作沟通，我们不会对外公开您的个人信息。</p>
            <form id="feedbackForm" class="feedback-form">
                <div class="form-group">
                    <label for="feedbackContent" class="form-label">留言内容 <span class="required">*</span></label>
                    <textarea id="feedbackContent" name="content" class="form-textarea" placeholder="请输入您的留言…" required minlength="1"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="feedbackEmail" class="form-label">邮箱（选填）</label>
                        <input type="email" id="feedbackEmail" name="email" class="form-input" placeholder="选填，便于我们回复您" />
                    </div>
                    <div class="form-group">
                        <label for="feedbackPhone" class="form-label">手机（选填）</label>
                        <input type="tel" id="feedbackPhone" name="phone" class="form-input" placeholder="选填，便于我们回复您" />
                    </div>
                </div>
                <p id="feedbackMessage" class="feedback-message" aria-live="polite"></p>
                <button type="submit" id="feedbackSubmit" class="feedback-submit">提交留言</button>
            </form>
        </section>

        <div class="contact-card">
            <h2>微信</h2>
            <div class="contact-qr">
                <img src="assets/wechat-qr.png" alt="联系微信二维码" />
            </div>
            <p class="contact-id">扫码添加微信</p>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div class="footer-links">
                <a href="index.html#product">产品介绍</a>
                <a href="index.html#download">软件下载</a>
                <a href="promo.html">推广合作</a>
                <a href="contact.html">联系</a>
                <a href="about.html">关于</a>
                <a href="privacy.html">隐私政策</a>
                <a href="terms.html">服务条款</a>
            </div>
            <p class="footer-beian">
                <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">闽ICP备2026006423号-1</a>
                <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=35012402000095" target="_blank" rel="noopener noreferrer">闽公网安备35012402000095号</a>
            </p>
            <p class="footer-copy">Copyright © 2025 摩迪 Mody. 保留所有权利.</p>
        </div>
    </footer>
    <script>
        (function() {
            /* 留言 API：使用相对路径 /api，需确保 Nginx 已将 /api 反代到后端（proxy_pass）。若需覆盖，可在页面加载前设置 window.MODY_API_BASE。 */
            var API_BASE = window.MODY_API_BASE || '';
            var form = document.getElementById('feedbackForm');
            var contentEl = document.getElementById('feedbackContent');
            var emailEl = document.getElementById('feedbackEmail');
            var phoneEl = document.getElementById('feedbackPhone');
            var messageEl = document.getElementById('feedbackMessage');
            var submitBtn = document.getElementById('feedbackSubmit');

            function showMsg(text, type) {
                messageEl.textContent = text;
                messageEl.className = 'feedback-message ' + (type || '');
            }

            var nav = document.querySelector('.nav');
            var toggle = document.getElementById('navToggle');
            if (toggle && nav) {
                toggle.addEventListener('click', function() { nav.classList.toggle('open'); });
                document.querySelectorAll('.nav-links a').forEach(function(a) {
                    a.addEventListener('click', function() { nav.classList.remove('open'); });
                });
            }

            if (form && submitBtn) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    var content = contentEl && contentEl.value ? contentEl.value.trim() : '';
                    if (!content) {
                        showMsg('请填写留言内容。', 'error');
                        return;
                    }
                    var contactParts = [];
                    if (emailEl && emailEl.value.trim()) contactParts.push('邮箱: ' + emailEl.value.trim());
                    if (phoneEl && phoneEl.value.trim()) contactParts.push('手机: ' + phoneEl.value.trim());
                    var contact = contactParts.length ? contactParts.join('；') : undefined;

                    submitBtn.disabled = true;
                    submitBtn.textContent = '提交中…';
                    showMsg('', '');

                    fetch(API_BASE ? (API_BASE.replace(/\/$/, '') + '/feedback/public') : '/api/feedback/public', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: content, contact: contact })
                    })
                    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
                    .then(function(result) {
                        if (result.ok && result.data && result.data.success) {
                            showMsg('感谢您的留言，我们已收到。', 'success');
                            if (contentEl) contentEl.value = '';
                            if (emailEl) emailEl.value = '';
                            if (phoneEl) phoneEl.value = '';
                        } else {
                            showMsg(result.data && result.data.message ? result.data.message : '提交失败，请稍后重试。', 'error');
                        }
                    })
                    .catch(function() {
                        showMsg('网络异常，请检查网络后重试。', 'error');
                    })
                    .finally(function() {
                        submitBtn.disabled = false;
                        submitBtn.textContent = '提交留言';
                    });
                });
            }
        })();
    </script>
</body>
</html>

# 复制到 ECS：/etc/nginx/conf.d/mody-website.conf
# 使用前请将 your_domain 替换为你的域名，或先用 server_name _; 仅用 IP 访问
#
# 联系页留言接口：使用相对路径 /api/feedback/public，需在本 server 内配置 /api 反代到后端，
# 否则请在前端通过 window.MODY_API_BASE 指定完整 API 地址（如 https://api.mody.中国）。

server {
    listen       80;
    server_name  _;
    root         /var/www/mody-website;
    index        index.html;

    # 联系页留言等接口：反代到 Node 后端（与 server 同机时一般为 3000 端口）
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # /downloads/ 必须返回真实文件，不能回退到 index.html，否则 APK 链接会打开官网
    # APK 通过 scp 传到服务器：/opt/mody/downloads/mody-android.apk
    location /downloads/ {
        alias /opt/mody/downloads/;
        error_page 404 =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}


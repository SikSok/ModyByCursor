<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #fafbfc;
            --color-primary: #0d9488;
            --color-text: #1e293b;
            --color-text-muted: #64748b;
            --color-border: #e2e8f0;
            --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --container-max: 1200px;
            --pad-x: clamp(16px, 4vw, 32px);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav {
            background: rgba(255,255,255,0.92);
            border-bottom: 1px solid var(--color-border);
        }
        .nav-inner {
            max-width: var(--container-max);
            margin: 0 auto;
            padding: clamp(12px, 2vw, 16px) var(--pad-x);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--color-text);
            font-weight: 700;
            font-size: clamp(1rem, 2.2vw, 1.25rem);
        }
        .nav-logo img { height: clamp(28px, 5vw, 36px); width: auto; }
        .nav-links { display: flex; align-items: center; gap: clamp(16px, 3vw, 32px); }
        .nav-links a {
            color: var(--color-text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: clamp(0.875rem, 1.8vw, 1rem);
        }
        .nav-links a:hover { color: var(--color-primary); }

        .page {
            flex: 1;
            padding: clamp(80px, 14vw, 120px) var(--pad-x);
            max-width: min(480px, 92vw);
            margin: 0 auto;
            text-align: center;
        }
        .page h1 {
            font-size: clamp(1.25rem, 2.5vw, 1.5rem);
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--color-text);
        }
        .page p {
            color: var(--color-text-muted);
            margin-bottom: 24px;
            font-size: clamp(0.875rem, 1.8vw, 1rem);
        }
        .page a {
            display: inline-block;
            padding: 10px 20px;
            background: var(--color-primary);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9375rem;
        }
        .page a:hover { opacity: 0.9; }

        .footer {
            padding: 16px var(--pad-x);
            background: var(--color-text);
            color: rgba(255,255,255,0.7);
            font-size: 0.8125rem;
            text-align: center;
        }
        .footer a { color: rgba(255,255,255,0.9); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>
    <header class="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="assets/ic_launcher.png" alt="摩迪">
                <span>摩迪 Mody</span>
            </a>
            <nav class="nav-links">
                <a href="index.html#product">产品介绍</a>
                <a href="index.html#download">软件下载</a>
                <a href="contact.html">联系</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <h1>页面暂未开放</h1>
        <p>该页面当前未开放，请返回首页浏览个人作品展示与下载。</p>
        <a href="index.html">返回首页</a>
    </main>

    <footer class="footer">
        <a href="index.html">摩迪 Mody</a> · 个人作品展示 · Copyright © 2025
    </footer>
</body>
</html>
